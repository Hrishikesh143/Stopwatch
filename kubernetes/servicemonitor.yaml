apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: stopwatch
  namespace: default
  labels:
    release: monitoring

spec:
  selector:
    matchLabels:
      app: stopwatch

  namespaceSelector:
    matchNames:
      - default

  endpoints:
    - port: http
      path: /metrics
      interval: 15s

apiVersion: apps/v1
kind: Deployment

metadata:
  name: stopwatch
  labels:
    app: stopwatch

spec:
  replicas: 2

  selector:
    matchLabels:
      app: stopwatch

  template:
    metadata:
      labels:
        app: stopwatch

    spec:
      containers:
      - name: stopwatch

        image: hrishu/stopwatch:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

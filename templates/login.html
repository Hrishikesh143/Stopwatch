<!-- Suppressed: Transactional Screen -->
<script>
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                loginForm.classList.add('block');
                signupForm.classList.add('hidden');
                signupForm.classList.remove('block');

                loginTab.classList.add('text-primary', 'font-bold', 'border-b-2', 'border-primary-container');
                loginTab.classList.remove('text-on-surface-variant');
                signupTab.classList.remove('text-primary', 'font-bold', 'border-b-2', 'border-primary-container');
                signupTab.classList.add('text-on-surface-variant');
            } else {
                signupForm.classList.remove('hidden');
                signupForm.classList.add('block');
                loginForm.classList.add('hidden');
                loginForm.classList.remove('block');

                signupTab.classList.add('text-primary', 'font-bold', 'border-b-2', 'border-primary-container');
                signupTab.classList.remove('text-on-surface-variant');
                loginTab.classList.remove('text-primary', 'font-bold', 'border-b-2', 'border-primary-container');
                loginTab.classList.add('text-on-surface-variant');
            }
        }

        // Lightweight interaction: Ripple effect simulated by scale on buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.96)';
            });
            btn.addEventListener('mouseup', () => {
                btn.style.transform = '';
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = '';
            });
        });
    </script>

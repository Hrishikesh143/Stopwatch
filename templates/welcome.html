<script>
        // Micro-interaction for inputs
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('span').classList.add('text-primary');
                input.parentElement.querySelector('span').classList.remove('text-secondary-fixed-dim');
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('span').classList.remove('text-primary');
                input.parentElement.querySelector('span').classList.add('text-secondary-fixed-dim');
            });
            input.addEventListener('input', (e) => {
                // Only allow numbers
                e.target.value = e.target.value.replace(/[^0-9]/g, '');
                if (e.target.value.length > 2) e.target.value = e.target.value.slice(0, 2);
            });
        });

        // Add some "instrument-like" feel on hover
        const startBtn = document.querySelector('button.bg-primary-container');
        startBtn.addEventListener('mouseenter', () => {
            startBtn.style.boxShadow = 'inset 0 1px 4px rgba(255,255,255,0.3), 0 10px 30px rgba(255, 87, 34, 0.4)';
        });
        startBtn.addEventListener('mouseleave', () => {
            startBtn.style.boxShadow = '';
        });
    </script>

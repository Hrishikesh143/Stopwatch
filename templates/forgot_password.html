                    "on-primary-fixed-variant": "#862200",

                    "inverse-on-surface": "#313030",
                    "on-background": "#e5e2e1",

            },
            "borderRadius": {

<style>
        body {
            background-color: #121212;
            color: #e5e2e1;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .glass-panel {
            background: rgba(46, 46, 46, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .input-focus-effect:focus {
            border-color: #FF5722;
            outline: none;
            box-shadow: 0 0 0 1px #FF5722;
        }
    </style>
</head>
<body class="bg-background font-body-md text-on-background selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar (Suppressing Navigation Shell as per Transactional Rule) -->
<header class="w-full top-0 sticky bg-surface flex justify-between items-center px-gutter py-base z-50">
<div class="font-headline-md text-headline-md font-bold text-primary">ChronoPrecision</div>
<div class="flex gap-sm">
<button class="material-symbols-outlined text-primary hover:bg-surface-container-high p-xs rounded transition-colors active:scale-95" data-icon="account_circle">account_circle</button>
<button class="material-symbols-outlined text-primary hover:bg-surface-container-high p-xs rounded transition-colors active:scale-95" data-icon="settings">settings</button>
</div>
</header>
<main class="min-h-[calc(100vh-64px)] flex items-center justify-center px-gutter py-xl relative overflow-hidden">
<!-- Atmospheric Background Element -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="w-full max-w-[440px] z-10">
<!-- Content Card -->
<div class="glass-panel p-md md:p-lg rounded-xl shadow-[0px_20px_40px_rgba(0,0,0,0.4)] transition-all">
<!-- Icon Header -->
<div class="mb-md flex flex-col items-center text-center">
<div class="w-16 h-16 bg-surface-container-highest rounded-full flex items-center justify-center mb-sm border border-white/5">
<span class="material-symbols-outlined text-primary text-[32px]" data-icon="lock_reset">lock_reset</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Reset your password</h1>
<p class="font-body-md text-on-surface-variant">Enter your registered email to receive a secure recovery link.</p>
</div>
<!-- Form Section -->
<form class="space-y-md" id="recovery-form" onsubmit="return false;">
<div class="flex flex-col gap-xs">
<label class="font-label-mono text-label-mono text-on-surface-variant uppercase tracking-wider" for="recovery-email">Recovery Email</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-b border-outline-variant text-on-surface font-body-md py-sm px-xs transition-all input-focus-effect placeholder:text-on-surface-variant/30" id="recovery-email" placeholder="name@example.com" required="" type="email">
<span class="absolute right-xs top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant/50" data-icon="mail">mail</span>
</div>
</div>
<div class="pt-sm">
<button class="w-full bg-primary-container text-white font-bold py-md rounded-lg shadow-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-sm group" id="submit-btn" style="box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 4px 12px rgba(255, 87, 34, 0.3);" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Feedback Message (Hidden by default) -->
<div class="hidden mt-md p-md bg-surface-container border border-primary/20 rounded-lg text-center animate-in fade-in slide-in-from-bottom-4 duration-500" id="success-message">
<span class="material-symbols-outlined text-primary mb-xs block text-[40px]" data-icon="check_circle">check_circle</span>
<p class="font-body-md text-on-surface">Check your inbox! We've sent instructions to that address.</p>
</div>
<!-- Secondary Actions -->
<div class="mt-lg flex flex-col items-center gap-sm">
<a class="font-label-mono text-label-mono text-primary flex items-center gap-xs hover:underline group" href="#">
<span class="material-symbols-outlined text-[18px]" data-icon="chevron_left">chevron_left</span>
                        Back to Login
                    </a>
</div>
</div>
<!-- Footer Note -->
<div class="mt-md text-center">
<p class="font-label-mono text-label-mono text-on-surface-variant/40">
                    Precision Timekeeping &amp; Security © 2024 ChronoPrecision
                </p>
</div>
</div>
</main>
<!-- Visual Accents -->
<div class="fixed bottom-gutter right-gutter hidden md:block opacity-20 pointer-events-none">
<div class="font-display-time text-[120px] leading-none select-none">RECOVER</div>
</div>
<!-- Interaction Script -->
<script>
        const form = document.getElementById('recovery-form');
        const submitBtn = document.getElementById('submit-btn');
        const successMsg = document.getElementById('success-message');
        const emailInput = document.getElementById('recovery-email');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Visual feedback loop
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Sending...';
            submitBtn.classList.add('opacity-80', 'cursor-not-allowed');

            // Simulate API delay
            setTimeout(() => {
                form.classList.add('hidden');
                successMsg.classList.remove('hidden');
            }, 1200);
        });

        // Subtle input interaction
        emailInput.addEventListener('focus', () => {
            emailInput.parentElement.parentElement.querySelector('label').classList.add('text-primary');
        });
        emailInput.addEventListener('blur', () => {
            emailInput.parentElement.parentElement.querySelector('label').classList.remove('text-primary');
        });
    </script>
<!-- Bottom Nav Bar (Suppressed as per the "Destination" rule in the Prompt Logic) -->
<!-- We skip rendering the BottomNavBar here because this is a focused transactional screen -->
</body></html>

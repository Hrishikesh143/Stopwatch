name: Build, Push and Deploy to RKE2

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: stopwatch

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python Syntax
        run: |
          python -m py_compile app.py

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Deploy to RKE2
    needs: build
    runs-on: self-hosted

    env:
      KUBECONFIG: /home/hrishikesh/.kube/config

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Kubernetes Cluster
        run: |
          kubectl get nodes

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f kubernetes/

      - name: Update Deployment Image
        run: |
          kubectl set image deployment/stopwatch \
          stopwatch=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Restart Deployment
        run: |
          kubectl rollout restart deployment stopwatch

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment stopwatch --timeout=180s

      - name: Verify Deployment
        run: |
          kubectl get deployment
          kubectl get pods -o wide
          kubectl get svc
